{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SJS Company</title>

    <link rel="stylesheet" href="{% static 'myApp/css/signin.css' %}">
</head>
<body>

<section class="signin">
    <div class="signin-container">

        <h2>Create New Password</h2>

        <p class="subtitle">
            Enter your new password below.
        </p>

        {% if messages %}
            {% for message in messages %}
                <p class="message">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input
                type="password"
                name="password"
                placeholder="New Password"
                required
            >

            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm Password"
                required
            >

            <button type="submit" class="btn-signin">
                Update Password
            </button>
        </form>

    </div>
</section>

</body>
</html>
